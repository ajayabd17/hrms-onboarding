name: Infrastructure Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "infrastructure/**"
      - "lambdas/**"
      - ".github/workflows/infrastructure-deploy.yml"
  workflow_dispatch:

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    env:
      HRMS_FRONTEND_ORIGIN: ${{ secrets.HRMS_FRONTEND_ORIGIN }}
      HRMS_EXISTING_USER_POOL_ID: ${{ secrets.HRMS_EXISTING_USER_POOL_ID }}
      HRMS_EXISTING_USER_POOL_CLIENT_ID: ${{ secrets.HRMS_EXISTING_USER_POOL_CLIENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: CDK synth
        run: cdk synth

      - name: Deploy Storage
        run: cdk deploy HrmsStorageStack --require-approval never

      - name: Deploy Messaging
        run: cdk deploy HrmsMessagingStack --require-approval never

      - name: Deploy Compute
        run: cdk deploy HrmsComputeStack --require-approval never

      - name: Deploy Orchestration
        run: cdk deploy HrmsOrchestrationStack --require-approval never

      - name: Deploy API
        run: cdk deploy HrmsApiStack --require-approval never
