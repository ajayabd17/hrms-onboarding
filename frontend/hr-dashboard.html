<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Admin | Pipeline Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-bg">
    <nav class="top-nav glass-panel">
        <div class="nav-brand">
            <div class="logo-mark small">HR</div>
            <span>Admin Control Center</span>
        </div>
        <div class="user-profile">
            <span id="user-greeting">HR Manager</span>
            <button id="logout-btn" class="btn-outline">Sign Out</button>
        </div>
    </nav>

    <main class="dashboard-container slide-up">
        <header class="dashboard-header hr-header">
            <div class="header-text">
                <h1>New Hire Pipeline Tracker</h1>
                <p>Real-time status of all active employee onboardings.</p>
            </div>
            <div class="stats-group">
                <div class="stat-card">
                    <span class="stat-num" id="hr-active-count">0</span>
                    <span class="stat-label">Active</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num" id="hr-completed-count">0</span>
                    <span class="stat-label">Completed</span>
                </div>
            </div>
        </header>

        <section class="pipeline-section glass-panel">
            <div class="table-controls">
                <input type="text" class="search-box" placeholder="Search employee...">
                <button class="btn-primary small" id="toggle-create-employee">Add Hire</button>
            </div>

            <form id="create-employee-form" style="display:none; margin: 16px 0;">
                <div class="table-controls" style="gap: 10px; margin-bottom: 10px;">
                    <input type="text" id="emp_full_name" class="search-box" placeholder="Full name" required>
                    <input type="email" id="emp_email" class="search-box" placeholder="Email" required>
                </div>
                <div class="table-controls" style="gap: 10px; margin-bottom: 10px;">
                    <input type="text" id="emp_department" class="search-box" placeholder="Department" required>
                    <input type="text" id="emp_role" class="search-box" placeholder="Role" required>
                </div>
                <div class="table-controls" style="gap: 10px; margin-bottom: 10px;">
                    <input type="text" id="emp_manager_id" class="search-box" placeholder="Manager ID" required>
                    <input type="date" id="emp_joining_date" class="search-box" required>
                    <select id="emp_employment_type" class="search-box" required>
                        <option value="FULL_TIME">FULL_TIME</option>
                        <option value="CONTRACT">CONTRACT</option>
                        <option value="INTERN">INTERN</option>
                    </select>
                    <button type="submit" class="btn-primary small">Submit</button>
                </div>
                <div id="create-employee-status" style="font-size: 14px;"></div>
            </form>

            <div class="pipeline-list" id="pipeline-list">
                <div class="pipeline-item reveal">
                    <div class="emp-details">
                        <div class="avatar">..</div>
                        <div>
                            <h4>Loading employees...</h4>
                            <span>Please wait</span>
                        </div>
                    </div>
                    <div class="hr-progress">
                        <div class="hero-progress-bar compact">
                            <div class="progress-fill pending-bg" style="width: 10%"></div>
                        </div>
                        <span class="step-label">Loading</span>
                    </div>
                    <div class="status-col">
                        <span class="badge badge-pending">Pending</span>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>

</html>
