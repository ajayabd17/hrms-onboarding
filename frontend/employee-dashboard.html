<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal | Active Onboarding</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-bg">
    <nav class="top-nav glass-panel">
        <div class="nav-brand">
            <div class="logo-mark small">H</div>
            <span>Onboarding Portal</span>
        </div>
        <div class="user-profile">
            <span id="user-greeting">Welcome, New Hire</span>
            <button id="logout-btn" class="btn-outline">Sign Out</button>
        </div>
    </nav>

    <main class="dashboard-container slide-up">
        <header class="dashboard-header">
            <div class="header-text">
                <h1>Your Onboarding Journey</h1>
                <p>Complete all stages to be Day 1 ready.</p>
            </div>
            <div class="status-badge pulse">Status: In Progress</div>
        </header>

        <section class="progress-section glass-panel">
            <h2>Overall Progress</h2>
            <div class="hero-progress-bar">
                <div class="progress-fill gradient-accent" style="width: 0%"></div>
            </div>
            <span class="progress-label">0% Completed</span>
        </section>

        <section class="pipeline-section glass-panel" style="margin-top: 16px;">
            <h2>Document Collection</h2>
            <form id="employee-doc-form">
                <div class="table-controls" style="gap: 10px; margin-bottom: 10px;">
                    <label>ID Proof (PDF/JPG/PNG)</label>
                    <input type="file" id="doc_id_proof" accept="application/pdf,image/png,image/jpeg" required>
                </div>
                <div class="table-controls" style="gap: 10px; margin-bottom: 10px;">
                    <label>Degree Certificate (PDF/JPG/PNG)</label>
                    <input type="file" id="doc_degree_cert" accept="application/pdf,image/png,image/jpeg" required>
                </div>
                <div class="table-controls" style="gap: 10px; margin-bottom: 10px;">
                    <label>Signed Offer Letter (PDF/JPG/PNG)</label>
                    <input type="file" id="doc_offer_letter" accept="application/pdf,image/png,image/jpeg" required>
                </div>
                <button type="submit" class="btn-primary small">Upload Documents</button>
                <div id="employee-doc-status" style="font-size:14px; margin-top:8px;"></div>
            </form>
        </section>

        <section class="stages-grid"></section>
    </main>
    <script src="app.js"></script>
</body>

</html>
