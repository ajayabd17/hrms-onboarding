<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS Onboarding | Change Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-bg">
    <div class="login-container glass-panel reveal">
        <div class="brand-logo">
            <div class="logo-mark">H</div>
            <h2>Change Password</h2>
        </div>
        <p class="login-subtitle">Please enter your new password below.</p>

        <form id="change-password-form" class="auth-form">
            <div class="input-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" required>
            </div>
            <div class="input-group">
                <label for="confirm_new_password">Enter New Password Again</label>
                <input type="password" id="confirm_new_password" required>
            </div>
            <div id="change-password-status" style="font-size:14px; margin: 8px 0;"></div>
            <button type="submit" class="btn-primary">
                <span>Send</span>
            </button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
