<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS Onboarding | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-bg">
    <div class="login-container glass-panel reveal">
        <div class="brand-logo">
            <div class="logo-mark">H</div>
            <h2>HRMS Portal</h2>
        </div>
        <p class="login-subtitle">Sign in to continue onboarding.</p>

        <form id="login-form" class="auth-form">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="input-group" id="new-password-group" style="display:none;">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" placeholder="Enter new password">
            </div>
            <div class="input-group" id="confirm-password-group" style="display:none;">
                <label for="confirm_new_password">Enter New Password Again</label>
                <input type="password" id="confirm_new_password" placeholder="Re-enter new password">
            </div>
            <div id="login-status" style="font-size:14px; margin: 8px 0;"></div>
            <button type="submit" class="btn-primary" id="login-btn">
                <span>Sign In Securely</span>
                <div class="loader hidden"></div>
            </button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
