<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS Onboarding | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-bg">
    <div class="login-container glass-panel reveal">
        <div class="brand-logo">
            <div class="logo-mark">H</div>
            <h2>HRMS Portal</h2>
        </div>
        <p class="login-subtitle">Welcome to your secure onboarding journey</p>
        
        <form id="login-form" class="auth-form">
            <div class="input-group">
                <label for="email">Work Email / User ID</label>
                <input type="text" id="email" placeholder="e.g. employee@company.com" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <div id="login-error" class="error-message hidden" style="color: #ff4d4f; font-size: 0.875rem; margin-bottom: 1rem; text-align: center;"></div>

            <button type="submit" class="btn-primary" id="login-btn">
                <span>Sign In Securely</span>
                <div class="loader hidden"></div>
            </button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
